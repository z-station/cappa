version: "3.3"

services:
  cappa-db:
    container_name: cappa-db
    image: postgres:12
    networks:
      - cappa-backend
    volumes:
      - ../postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: cappa
      POSTGRES_PASSWORD: cappa
      POSTGRES_DB: cappa
    restart: always

  cappa-app:
    build:
      context: ..
      dockerfile: ./docker/app/Dockerfile
    container_name: cappa-app
    image: cappa-app
    networks:
      - cappa-backend
      - cappa-proxy
    volumes:
      - cappa-public:/app/public
      - ../media:/app/media
      - ../src:/app/src
    environment:
      POSTGRES_HOST: cappa-db
      APP_STATIC_ROOT: /app/public/static
    depends_on:
      - cappa-db
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-h", cappa-db]
      interval: 5s
      timeout: 5s
      retries: 10

  cappa-nginx:
    build: nginx
    container_name: cappa-nginx
    image: cappa-nginx
    volumes:
      - cappa-public:/public
      - ../media:/media
    depends_on:
      - cappa-app
    networks:
      - cappa-proxy
    ports:
      - "8000:8000"
    expose:
      - "8000"
    restart: always

  cappa-python-3.8:
    build: python-3.8
    container_name: cappa-python-3.8
    image: cappa-python-3.8
    volumes:
      - cappa-tmp:/tmp/files/
    depends_on:
      - cappa-app
    restart: on-failure

  cappa-gcc-7.5:
    build: gcc-7.5
    container_name: cappa-gcc-7.5
    image: cappa-gcc-7.5
    volumes:
      - cappa-tmp:/tmp/files/
    depends_on:
      - cappa-app
    restart: on-failure

networks:
  cappa-proxy:
  cappa-backend:

volumes:
  cappa-public:
  cappa-tmp: