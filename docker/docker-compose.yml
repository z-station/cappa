version: "3.3"

services:
  cappa-db:
    container_name: cappa-db
    image: postgres:13
    networks:
      - cappa-backend
    volumes:
      - ../postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: cappa
      POSTGRES_PASSWORD: cappa
      POSTGRES_DB: cappa
    restart: always

  cappa-app:
    build:
      context: ..
      dockerfile: ./docker/app/Dockerfile
    container_name: cappa-app
    image: cappa-app
    networks:
      - cappa-backend
      - cappa-proxy
    volumes:
      - cappa-public:/app/public
      - ../media:/app/media
      - ../src:/app/src
      - ../backup:/app/backup

    environment:
      PGPASSWORD: cappa
      POSTGRES_USER: cappa
      POSTGRES_PASSWORD: cappa
      POSTGRES_DB: cappa
      POSTGRES_HOST: cappa-db
      APP_STATIC_ROOT: /app/public/static
      APP_TMP_DIR: /app/tmp
    depends_on:
      - cappa-db
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-h", cappa-db]
      interval: 5s
      timeout: 5s
      retries: 10

  cappa-nginx:
    build: nginx
    container_name: cappa-nginx
    image: cappa-nginx
    volumes:
      - cappa-public:/public
      - ../media:/media
    depends_on:
      - cappa-app
    networks:
      - cappa-proxy
    ports:
      - "8000:8000"
    restart: always

networks:
  cappa-proxy:
  cappa-backend:

volumes:
  cappa-public: